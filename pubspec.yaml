name: sim_env
description: "SimEnv - A blind-accessible simulation environment where you shape and listen to a living world"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Audio
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21

  # Accessibility / TTS
  flutter_tts: ^4.2.0

  # Persistence
  shared_preferences: ^2.3.5
  sqflite: ^2.4.2

  # Navigation
  go_router: ^14.8.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/data/
